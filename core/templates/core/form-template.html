
{% for field in form %}
<div class="form-group mb-3">
    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
    <small class="form-text text-muted">{{ field.help_text }}</small>
    {% endif %}
    {% if field.errors %}
    <div class="alert alert-danger mt-2">
        {{ field.errors }}
    </div>
    {% endif %}
</div>
{% endfor %}
