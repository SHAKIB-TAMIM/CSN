{% extends 'core/base_landing.html' %}
{% load static %}

{% block title %}Password Reset Complete - Campus Social Network{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <div class="bg-green-600 px-6 py-8 text-center">
                <i class="fas fa-check-circle text-5xl text-white mb-4"></i>
                <h1 class="text-2xl font-bold text-white">Password Reset Complete</h1>
            </div>
            
            <div class="p-6 text-center">
                <p class="text-gray-600 mb-6">
                    Your password has been successfully reset. You can now log in with your new password.
                </p>
                
                <a href="{% url 'login' %}" 
                   class="inline-block w-full py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    <i class="fas fa-sign-in-alt mr-2"></i> Log In Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
