version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: csn_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-social_network}
      MYSQL_USER: ${DB_USER:-admins}
      MYSQL_PASSWORD: ${DB_PASSWORD:-YourStrongPassword123!}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword123!}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - csn_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: csn_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - csn_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: csn_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 campus_social_network.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - csn_network

  celery:
    build: .
    container_name: csn_celery
    restart: unless-stopped
    command: celery -A campus_social_network worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
      - media_volume:/app/media
    environment:
      - DEBUG=${DEBUG:-False}
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - web
    networks:
      - csn_network

  celery-beat:
    build: .
    container_name: csn_celery_beat
    restart: unless-stopped
    command: celery -A campus_social_network beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - web
    networks:
      - csn_network

  nginx:
    image: nginx:1.25-alpine
    container_name: csn_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - csn_network

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  csn_network:
    driver: bridge